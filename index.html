<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Andzee | The Future Classrooms</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts: Plus Jakarta Sans + DM Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <!-- ==========================================
                START EXPERIENCE SCREEN
    =========================================== -->
    <div id="startScreen">
        <canvas id="startCanvas"></canvas>

        <!-- Ambient aurora layers -->
        <div class="aurora aurora-blue"></div>
        <div class="aurora aurora-purple"></div>

        <div class="start-content">
            <div class="logo-badge">
                <img src="Andzee.png" alt="Andzee Logo" class="start-logo">
            </div>
            <p class="start-tagline">Learn · Compete · Succeed</p>
            <button id="startExperience">
                <span class="btn-text">
                    <i class="fa-solid fa-play"></i>
                    Start Experience
                </span>
                <span class="btn-shine"></span>
            </button>
        </div>
    </div>

    <!-- ==========================================
                    VIDEO LOADER
    =========================================== -->
    <div id="loader" class="hidden-loader">
        <video
            id="loaderVideo"
            class="loader-video"
            playsinline
            preload="auto">
            <source src="andzee-loader.mp4" type="video/mp4">
        </video>

        <button id="skipIntro">
            <i class="fa-solid fa-forward-step"></i>
            Skip Intro
        </button>
    </div>

    <!-- ==========================================
                    LOGIN PAGE
    =========================================== -->
    <div class="page hidden" id="mainPage">

        <canvas id="mainCanvas"></canvas>

        <!-- Aurora background layers -->
        <div class="aurora aurora-blue"></div>
        <div class="aurora aurora-purple"></div>
        <div class="aurora aurora-amber"></div>

        <!-- Subtle floating icons -->
        <div class="floating-icons" aria-hidden="true">
            <i class="fa-solid fa-paper-plane icon icon1"></i>
            <i class="fa-solid fa-star icon icon2"></i>
            <i class="fa-solid fa-book-open icon icon3"></i>
            <i class="fa-solid fa-trophy icon icon4"></i>
            <i class="fa-solid fa-graduation-cap icon icon5"></i>
        </div>

        <div class="container">

            <!-- Logo -->
            <div class="logo-lockup fade-up">
                <div class="main-logo-wrap">
                    <img src="Andzee.png" alt="Andzee" class="main-logo">
                </div>
            </div>

            <!-- Headline -->
            <h1 class="hero-headline fade-up delay-1">
                The Future<br>
                <span class="gradient-text">Classrooms</span>
            </h1>

            <p class="hero-sub fade-up delay-2">
                Learn English · Compete Smart · Get Placement Ready
            </p>

            <!-- Card -->
            <div class="join-card fade-up delay-3">

                <!-- Student section -->
                <div class="card-section">
                    <div class="section-eyebrow">
                        <span class="eyebrow-dot student-dot"></span>
                        Student — Join a Live Game
                    </div>

                        <button id="joinBtn" onclick="window.location.href='teacher.html'">
                            <span>Join</span>
                            <i class="fa-solid fa-arrow-right"></i>
                        </button>
                    </div>
                </div>

                <!-- Divider -->
                <div class="card-divider">
                    <div class="divider-line"></div>
                    <span class="divider-label">or</span>
                    <div class="divider-line"></div>
                </div>

                <!-- Teacher section -->
                <div class="card-section">
                    <div class="section-eyebrow">
                        <span class="eyebrow-dot teacher-dot"></span>
                        Teacher — Manage Sessions
                    </div>

                    <button class="teacher-btn" id="hostBtn" onclick="window.location.href='teacher.html'">
                        <span class="teacher-icon-wrap">
                            <i class="fa-solid fa-chalkboard-user"></i>
                        </span>
                        <span class="teacher-label">Teacher Dashboard</span>
                        <i class="fa-solid fa-chevron-right teacher-arrow"></i>
                    </button>
                </div>

            </div>

            <p class="footer-note fade-up delay-4">
                Powered by Andzee · Placement-Ready English Learning
            </p>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
